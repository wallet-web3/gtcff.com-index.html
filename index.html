<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCFF Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
  }

  .card {
    width: 360px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    text-align: center;
    color: white;
  }

  .title {
    font-size: 26px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #1d4ed8;
  }

  .msg {
    margin-top: 12px;
    font-size: 14px;
    color: #fbbf24;
  }
</style>

</head>

<body>

<div class="card">
  <div class="title">Welcome to GCFF</div>

  <!-- email pré-rempli -->
  <input type="text" id="user" value="francoislitilm@gmail.com" />

  <!-- mot de passe masqué automatiquement -->
  <input type="password" id="pass" placeholder="Password" />

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "francoislitilm@gmail.com" && p === "1234") {
    document.getElementById("msg").style.color = "#22c55e";
    document.getElementById("msg").innerText = "Login successful ✔";
  } else {
    document.getElementById("msg").style.color = "#fbbf24";
    document.getElementById("msg").innerText = "Wrong credentials";
  }
}
</script>

</body>
</html>
