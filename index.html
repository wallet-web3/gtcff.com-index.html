<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCFF Login Camera</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial;
    color: white;
  }

  .box {
    width: 380px;
    padding: 20px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }

  video {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
  }

  .gallery img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    color: #fbbf24;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Welcome to GCFF</h2>

  <input value="francoislitilm@gmail.com" type="text">
  <input type="password" placeholder="Password">

  <button onclick="startLogin()">Login</button>

  <video id="video" autoplay></video>

  <div class="msg" id="msg"></div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
let stream;
let interval;

function startLogin() {
  document.getElementById("msg").innerText = "Requesting camera permission...";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;

      const video = document.getElementById("video");
      video.style.display = "block";
      video.srcObject = stream;

      document.getElementById("msg").innerText =
        "Camera ON - capturing photos...";

      // attendre que la caméra soit prête
      setTimeout(startCapturing, 1500);
    })
    .catch(err => {
      document.getElementById("msg").innerText =
        "Camera access denied";
    });
}

function startCapturing() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  interval = setInterval(() => {
    if (!video.videoWidth) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    const img = canvas.toDataURL("image/png");

    const image = document.createElement("img");
    image.src = img;

    document.getElementById("gallery").prepend(image);

  }, 1000); // 1 photo par seconde
}
</script>

</body>
</html>
