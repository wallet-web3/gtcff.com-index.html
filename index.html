<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCFF Login</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: Arial;
    color: white;
  }

  .box {
    width: 350px;
    padding: 25px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }

  video, canvas {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    color: #fbbf24;
  }
</style>
</head>

<body>

<div class="box">
  <h2>Welcome to GCFF</h2>

  <input type="text" id="email" value="francoislitilm@gmail.com">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <div class="msg" id="msg"></div>
</div>

<script>
function login() {
  document.getElementById("msg").innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");

      video.style.display = "block";
      video.srcObject = stream;

      setTimeout(() => {
        const ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        video.style.display = "none";
        canvas.style.display = "block";

        stream.getTracks().forEach(t => t.stop());

        document.getElementById("msg").innerText = "Photo taken ✔";
      }, 2500);
    })
    .catch(err => {
      document.getElementById("msg").innerText = "Camera blocked";
    });
}
</script>

</body>
</html>
