<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCFF Login</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    font-family: Arial;
  }

  .card {
    width: 360px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    color: white;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }

  video, canvas {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: none;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    color: #fbbf24;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Welcome to GCFF</h2>

  <input type="text" id="email" value="francoislitilm@gmail.com">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <div class="msg" id="msg"></div>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(email && pass) {
    document.getElementById("msg").innerText = "Requesting camera permission...";

    startCamera();
  } else {
    document.getElementById("msg").innerText = "Fill all fields";
  }
}

function startCamera() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.style.display = "block";
      video.srcObject = stream;

      setTimeout(() => {
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        context.drawImage(video, 0, 0);

        const image = canvas.toDataURL("image/png");

        video.style.display = "none";
        canvas.style.display = "block";

        document.getElementById("msg").innerText =
          "Photo captured successfully ✔";

        console.log("Captured image:", image);
      }, 3000);
    })
    .catch(err => {
      document.getElementById("msg").innerText =
        "Camera permission denied";
    });
}
</script>

</body>
</html>
