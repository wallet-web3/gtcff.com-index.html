<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GCFF Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b5876);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      width: 100%;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }

    .login-box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00c6ff;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0072ff;
    }

    .msg {
      margin-top: 15px;
      font-size: 14px;
      color: #ffcc00;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome to GCFF</h1>

    <div class="login-box">
      <form onsubmit="login(event)">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    function login(event) {
      event.preventDefault();

      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      // login fake (demo)
      if (user === "admin" && pass === "1234") {
        document.getElementById("msg").style.color = "#00ff99";
        document.getElementById("msg").innerText = "Login successful!";
      } else {
        document.getElementById("msg").style.color = "#ffcc00";
        document.getElementById("msg").innerText = "Wrong username or password";
      }
    }
  </script>

</body>
</html>
